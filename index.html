<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚠️ SYSTEM LOCKED ⚠️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            font-family: 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999999;
        }

        /* OVERLAY UTAMA - PALING ATAS */
        .overlay-locker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 2147483647;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(0px);
        }

        /* GLITCH OVERLAY */
        .glitch {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,0,0,0.1) 0px, rgba(255,0,0,0.1) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 2147483648;
            animation: glitchMove 0.15s linear infinite;
        }

        @keyframes glitchMove {
            0% { transform: translateY(0); opacity: 0.3; }
            100% { transform: translateY(10px); opacity: 0.6; }
        }

        /* MAIN CARD */
        .lock-card {
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #ff0000;
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 400px;
            width: 85%;
            text-align: center;
            z-index: 2147483649;
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.5);
            animation: borderPulse 1s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 40px rgba(255,0,0,0.4); }
            50% { border-color: #ff6666; box-shadow: 0 0 80px rgba(255,0,0,0.8); }
        }

        /* TITLE */
        .title {
            color: #ff0000;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: textBlink 0.8s infinite;
        }

        @keyframes textBlink {
            0%, 100% { opacity: 1; text-shadow: 0 0 5px red; }
            50% { opacity: 0.7; text-shadow: 0 0 15px red; }
        }

        /* WARNING TEXT */
        .warning-text {
            color: #ff8888;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* PIN DISPLAY */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .pin-dot {
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .pin-dot.filled {
            background: #ff4444;
            box-shadow: 0 0 15px #ff4444;
        }

        /* PIN BUTTONS */
        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .pin-btn {
            background: #1a1a2e;
            border: 1px solid #ff4444;
            border-radius: 60px;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: all 0.05s linear;
        }

        .pin-btn:active {
            transform: scale(0.92);
            background: #ff4444;
        }

        /* ACTION BUTTONS */
        .action-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            background: #222;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .unlock-btn {
            background: linear-gradient(135deg, #ff4444, #aa2222);
            margin-top: 15px;
            padding: 16px;
            font-size: 18px;
        }

        /* ATTEMPT COUNTER */
        .attempt-counter {
            color: #ffaa44;
            font-size: 14px;
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 30px;
        }

        /* PERMANENT LOCK */
        .permanent-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2147483650;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: bloodFlash 0.3s infinite;
        }

        @keyframes bloodFlash {
            0%, 100% { background: #000000; }
            50% { background: #2a0000; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="overlay-locker" id="lockerOverlay">
    <div class="glitch"></div>
    
    <div class="lock-card">
        <div class="title">🔒 RIYAN FOMO 🔒</div>
        <div class="warning-text">
            ⚠️ SISTEM TELAH DIKUNCI ⚠️<br>
            JANGAN TUTUP APLIKASI INI<br>
            MASUKKAN PIN UNTUK MEMBUKA KUNCI
        </div>
        
        <div class="pin-display" id="pinDisplay">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>
        
        <div class="pin-grid" id="pinGrid">
            <div class="pin-btn" data-num="1">1</div>
            <div class="pin-btn" data-num="2">2</div>
            <div class="pin-btn" data-num="3">3</div>
            <div class="pin-btn" data-num="4">4</div>
            <div class="pin-btn" data-num="5">5</div>
            <div class="pin-btn" data-num="6">6</div>
            <div class="pin-btn" data-num="7">7</div>
            <div class="pin-btn" data-num="8">8</div>
            <div class="pin-btn" data-num="9">9</div>
            <div class="pin-btn" data-action="clear">🗑️</div>
            <div class="pin-btn" data-num="0">0</div>
            <div class="pin-btn" data-action="delete">⌫</div>
        </div>
        
        <div class="action-row">
            <button class="action-btn" id="clearBtn">BERSIHKAN</button>
        </div>
        
        <button class="action-btn unlock-btn" id="unlockBtn">💀 UNLOCK 💀</button>
        
        <div class="attempt-counter" id="attemptCounter">
            PERCOBAAN: 0 / 5
        </div>
        
        <div style="color: #333; font-size: 9px; margin-top: 15px;">
            © REX-EYE SYSTEM | VISUAL ONLY
        </div>
    </div>
</div>

<script>
    // ============= KONFIGURASI =============
    const PIN_CODE = "1407";
    const MAX_ATTEMPTS = 5;
    
    let currentPin = "";
    let attempts = 0;
    let isUnlocked = false;
    
    // ============= LOCK SYSTEM =============
    // BLOCK SEMUA TOMBOL KELUAR
    function blockExit() {
        // Block history back
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            history.go(1);
            blockExit();
        };
        
        // Block semua tombol
        document.addEventListener('keydown', function(e) {
            const blockedKeys = ['Backspace', 'Escape', 'F5', 'F12', 'Home', 'End', 'PageUp', 'PageDown'];
            if (blockedKeys.includes(e.key)) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
            
            // Block Alt + Tab, Alt + F4 dll
            if (e.altKey || e.ctrlKey || e.metaKey) {
                e.preventDefault();
                return false;
            }
            
            // Block tombol volume dan lainnya
            if (e.key === 'VolumeUp' || e.key === 'VolumeDown' || e.key === 'Power') {
                e.preventDefault();
                return false;
            }
        });
        
        // Block context menu (right click)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // Block touch gestures (swipe from edges)
        document.body.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            const edgeThreshold = 30;
            if (touch.clientX < edgeThreshold || touch.clientX > window.innerWidth - edgeThreshold) {
                e.preventDefault();
            }
        });
        
        // Block double tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        });
    }
    
    // ============= LOCK ORIENTATION =============
    function lockOrientation() {
        // Force portrait mode
        screen.orientation?.lock('portrait').catch(() => {});
        
        // Jika berubah orientation, force balik
        window.addEventListener('orientationchange', function() {
            setTimeout(() => {
                screen.orientation?.lock('portrait').catch(() => {});
            }, 100);
        });
    }
    
    // ============= PREVENT SLEEP =============
    function preventSleep() {
        // Keep screen awake (request wake lock)
        if ('wakeLock' in navigator) {
            let wakeLock = null;
            const requestWakeLock = async () => {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log('Wake lock error');
                }
            };
            requestWakeLock();
            
            // Reacquire if page becomes visible again
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    requestWakeLock();
                }
            });
        }
    }
    
    // ============= UPDATE PIN DISPLAY =============
    function updatePinDisplay() {
        const dots = document.querySelectorAll('.pin-dot');
        dots.forEach((dot, i) => {
            if (i < currentPin.length) {
                dot.classList.add('filled');
            } else {
                dot.classList.remove('filled');
            }
        });
    }
    
    // ============= SHOW TOAST =============
    function showToast(message, isError = true) {
        // Create toast element if not exists
        let toast = document.getElementById('customToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'customToast';
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%) translateY(100px);
                background: rgba(0,0,0,0.95);
                border-left: 4px solid #ff0000;
                border-radius: 12px;
                padding: 12px 20px;
                color: white;
                font-size: 14px;
                z-index: 2147483650;
                transition: transform 0.3s ease;
                white-space: nowrap;
                font-family: monospace;
            `;
            document.body.appendChild(toast);
        }
        
        toast.textContent = message;
        toast.style.transform = 'translateX(-50%) translateY(0)';
        
        setTimeout(() => {
            toast.style.transform = 'translateX(-50%) translateY(100px)';
        }, 2000);
    }
    
    // ============= SHAKE EFFECT =============
    function shakeCard() {
        const card = document.querySelector('.lock-card');
        card.style.transform = 'translateX(0)';
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'shakeCard 0.3s ease';
        setTimeout(() => {
            card.style.animation = '';
        }, 300);
        
        // Flash red
        document.body.style.background = '#330000';
        setTimeout(() => {
            document.body.style.background = '';
        }, 200);
    }
    
    // Add shake keyframe
    const style = document.createElement('style');
    style.textContent = `
        @keyframes shakeCard {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    `;
    document.head.appendChild(style);
    
    // ============= WRONG PIN EFFECT =============
    function wrongPinEffect(remaining) {
        shakeCard();
        
        let message = '';
        if (remaining === 4) message = '❌ PIN SALAH! Sisa 4 percobaan';
        else if (remaining === 3) message = '⚠️ PIN SALAH! Sisa 3 percobaan ⚠️';
        else if (remaining === 2) message = '💀 PIN SALAH! Sisa 2 percobaan! 💀';
        else if (remaining === 1) message = '🔴 PERINGATAN TERAKHIR! Sisa 1 percobaan! 🔴';
        else message = `PIN SALAH! Sisa ${remaining} percobaan`;
        
        showToast(message);
        
        // Vibration
        try {
            if (navigator.vibrate) navigator.vibrate(300);
        } catch(e) {}
        
        // Update counter display
        const counterSpan = document.getElementById('attemptCounter');
        counterSpan.innerHTML = `PERCOBAAN: ${attempts} / ${MAX_ATTEMPTS}`;
        counterSpan.style.animation = 'none';
        counterSpan.offsetHeight;
        counterSpan.style.animation = 'textBlink 0.3s';
    }
    
    // ============= PERMANENT LOCK =============
    function permanentLock() {
        const overlay = document.getElementById('lockerOverlay');
        overlay.innerHTML = `
            <div class="permanent-overlay">
                <div style="text-align: center;">
                    <div style="font-size: 80px; margin-bottom: 20px;">💀</div>
                    <div style="color: #ff0000; font-size: 24px; font-weight: bold; margin-bottom: 15px;">PERMANENT LOCK</div>
                    <div style="color: #ff8888; font-size: 14px; max-width: 280px; margin: 0 auto;">
                        ANDA GAGAL 5 KALI<br>
                        TIDAK ADA CARA KELUAR<br>
                        RESTART APLIKASI UNTUK MENCOBA LAGI
                    </div>
                    <div style="color: #444; font-size: 10px; margin-top: 30px;">
                        REX-EYE SYSTEM
                    </div>
                </div>
            </div>
        `;
        
        // Keep blocking
        blockExit();
    }
    
    // ============= UNLOCK =============
    function unlock() {
        if (isUnlocked) return;
        
        showToast('✅ PIN BENAR! SISTEM DIBUKA ✅', false);
        
        // Unlock effect
        const card = document.querySelector('.lock-card');
        card.style.animation = 'none';
        card.style.transform = 'scale(0.95)';
        card.style.opacity = '0';
        
        setTimeout(() => {
            // Remove overlay completely
            const overlay = document.getElementById('lockerOverlay');
            overlay.style.transition = 'opacity 0.5s';
            overlay.style.opacity = '0';
            
            setTimeout(() => {
                overlay.remove();
                isUnlocked = true;
                
                // Show success message
                const successDiv = document.createElement('div');
                successDiv.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: #0a0a0a;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    flex-direction: column;
                    z-index: 999999;
                    font-family: monospace;
                `;
                successDiv.innerHTML = `
                    <div style="font-size: 80px; margin-bottom: 20px;">🔓</div>
                    <div style="color: #00ff00; font-size: 24px; font-weight: bold;">UNLOCKED</div>
                    <div style="color: white; margin-top: 20px;">Tekan tombol home untuk keluar</div>
                    <div style="color: #444; font-size: 10px; margin-top: 50px;">© REX-EYE | RIYAN FOMO</div>
                `;
                document.body.appendChild(successDiv);
                
                setTimeout(() => {
                    if (document.exitFullscreen) document.exitFullscreen();
                }, 1000);
            }, 500);
        }, 200);
    }
    
    // ============= CHECK PIN =============
    function checkPin() {
        if (isUnlocked) return;
        
        if (currentPin === PIN_CODE) {
            unlock();
        } else {
            attempts++;
            const remaining = MAX_ATTEMPTS - attempts;
            
            const counterSpan = document.getElementById('attemptCounter');
            counterSpan.innerHTML = `PERCOBAAN: ${attempts} / ${MAX_ATTEMPTS}`;
            
            wrongPinEffect(remaining);
            currentPin = "";
            updatePinDisplay();
            
            if (remaining <= 0) {
                permanentLock();
            }
        }
    }
    
    // ============= PIN FUNCTIONS =============
    function addDigit(digit) {
        if (isUnlocked) return;
        if (currentPin.length < 4) {
            currentPin += digit;
            updatePinDisplay();
            
            // Auto submit if 4 digits
            if (currentPin.length === 4) {
                setTimeout(() => checkPin(), 150);
            }
        }
    }
    
    function deleteLastDigit() {
        if (isUnlocked) return;
        currentPin = currentPin.slice(0, -1);
        updatePinDisplay();
    }
    
    function clearAll() {
        if (isUnlocked) return;
        currentPin = "";
        updatePinDisplay();
    }
    
    // ============= EVENT LISTENERS =============
    document.querySelectorAll('.pin-btn[data-num]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const num = btn.getAttribute('data-num');
            addDigit(num);
            try { if (navigator.vibrate) navigator.vibrate(30); } catch(e) {}
        });
    });
    
    document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteLastDigit();
            try { if (navigator.vibrate) navigator.vibrate(20); } catch(e) {}
        });
    });
    
    document.querySelectorAll('[data-action="clear"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            clearAll();
        });
    });
    
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('unlockBtn').addEventListener('click', checkPin);
    
    // Keyboard support
    document.addEventListener('keydown', (e) => {
        if (isUnlocked) return;
        
        if (e.key >= '0' && e.key <= '9') {
            addDigit(e.key);
            e.preventDefault();
        }
        if (e.key === 'Backspace') {
            deleteLastDigit();
            e.preventDefault();
        }
        if (e.key === 'Enter') {
            checkPin();
            e.preventDefault();
        }
        
        // Block all system keys
        if (e.key === 'Escape' || e.key === 'F5' || e.key === 'F12' || 
            e.altKey || e.ctrlKey || e.metaKey) {
            e.preventDefault();
        }
    });
    
    // ============= INITIALIZE =============
    function init() {
        blockExit();
        lockOrientation();
        preventSleep();
        
        // Request fullscreen
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) {
            docEl.requestFullscreen();
        }
        
        // Focus on the page
        window.focus();
        
        console.log('%c🔒 RIYAN FOMO LOCKER ACTIVE', 'color: #ff0000; font-size: 16px; font-weight: bold;');
        console.log('%c🔓 UNLOCK PIN: 1407', 'color: #00ff00; font-size: 14px;');
        console.log('%c⚠️ TIDAK BISA KELUAR SAMPE PIN BENAR ⚠️', 'color: yellow; font-size: 12px;');
    }
    
    init();
</script>

</body>
</html>
